# .github/workflows/research_monitor.yml
#
# WAIMS Weekly Evidence Review
# Runs every Monday 8am UTC automatically.
# Also runs manually from the GitHub Actions tab anytime.
#
# What it does:
#   1. Searches PubMed for new papers across 9 topics
#   2. Fetches RSS from Martin Buchheit, SPSR, BJSM
#   3. Applies formal evidence gate (CANDIDATE / REVIEW / WATCHLIST)
#   4. Saves HTML report + updates research_log.json
#   5. Commits both files back to your repo
#
# To view results:
#   Go to your GitHub repo -> research_report_YYYYMMDD.html -> click Raw
#   Or clone/pull locally and open the HTML file in a browser
#
# No API keys or secrets required for basic use (PubMed is free).
# Optional email notification: add GMAIL_USER, GMAIL_PASS, NOTIFY_EMAIL
# as GitHub repository secrets (Settings -> Secrets -> Actions).

name: WAIMS Evidence Review

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 8:00am UTC
  workflow_dispatch:       # Also allows manual trigger from Actions tab

jobs:
  evidence-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run evidence review
        run: python research_monitor.py --days 7 --save --html

      - name: Commit results to repo
        run: |
          git config user.name "WAIMS Evidence Monitor"
          git config user.email "monitor@waims-auto"
          git add research_log.json
          git add research_report_*.html
          git diff --staged --quiet || git commit -m "Evidence review: $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Optional email notification ────────────────────────────────────────
      # Uncomment this block and add 3 secrets to your repo to enable email:
      #   Settings -> Secrets and variables -> Actions -> New repository secret
      #   GMAIL_USER  = your Gmail address
      #   GMAIL_PASS  = Gmail app password (not your regular password)
      #   NOTIFY_EMAIL = where to send the notification
      #
      # - name: Send email notification
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 587
      #     username: ${{ secrets.GMAIL_USER }}
      #     password: ${{ secrets.GMAIL_PASS }}
