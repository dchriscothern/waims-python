name: WAIMS Weekly Model Retrain

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
  push:
    paths:
      - 'train_models.py'
      - 'generate_database.py'

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Retrain models
        run: python train_models.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated models
        run: |
          git config user.name "WAIMS Model Trainer"
          git config user.email "trainer@waims"
          git add models/injury_risk_model.pkl \
                  models/readiness_scorer.pkl \
                  data/processed_data.csv 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "Weekly model retrain $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report outcome
        if: always()
        run: |
          echo "Retrain completed: $(date)"
          echo "Model files:"
          ls -lh models/*.pkl 2>/dev/null || echo "No pkl files found"
          ls -lh data/processed_data.csv 2>/dev/null || echo "No processed_data.csv found"
